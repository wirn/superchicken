      <path fill="url(#capShadow)" opacity="0.45"
        d="M84 197 C126 173, 189 167, 252 169 C327 171, 381 182, 435 208 C419 223, 383 225, 320 225 L120 225 C101 225, 90 219, 84 197 Z"/>
      <path class="outline" fill="#8f0d14"
        d="M101 208
           C131 192, 178 186, 249 186
           C320 186, 369 192, 410 208
           C384 220, 338 226, 249 226
           C165 226, 121 221, 101 208 Z"/>
      <ellipse cx="162" cy="165" rx="44" ry="23" class="spot" transform="rotate(-9 162 165)"/>
      <ellipse cx="253" cy="147" rx="52" ry="31" class="spot" transform="rotate(7 253 147)"/>
      <ellipse cx="341" cy="168" rx="31" ry="18" class="spot" transform="rotate(8 341 168)"/>
      <ellipse cx="400" cy="142" rx="38" ry="23" class="spot"/>
      <ellipse cx="107" cy="147" rx="30" ry="18" class="spot" transform="rotate(-18 107 147)"/>
      <ellipse cx="304" cy="126" rx="18" ry="11" fill="#fff" opacity="0.4"/>
      <ellipse cx="223" cy="177" rx="22" ry="10" fill="#ff603e" opacity="0.45"/>
    </g>

    <g>
      <path class="outline" fill="url(#stemCream)"
        d="M167 205
           C184 198, 220 194, 253 194
           C286 194, 316 198, 332 205
           C328 223, 307 236, 252 241
           C202 245, 178 236, 167 205 Z"/>
      <path d="M220 214 C230 226, 269 226, 283 214" fill="none" stroke="#67110f" stroke-width="7" stroke-linecap="round"/>
      <ellipse cx="279" cy="224" rx="7" ry="5" fill="#c57c43" opacity="0.35"/>
    </g>

    <g>
      <path d="M38 228 C55 209, 72 204, 94 203 C86 216, 84 228, 86 243 C68 241, 52 237, 38 228 Z" fill="url(#leaf)" class="leafStroke"/>
      <path d="M55 233 C66 225, 76 217, 87 207" fill="none" class="leafStroke"/>

      <path d="M423 229 C442 210, 463 203, 489 204 C476 220, 472 232, 473 246 C452 244, 436 239, 423 229 Z" fill="url(#leaf)" class="leafStroke"/>
      <path d="M442 234 C452 225, 462 216, 474 206" fill="none" class="leafStroke"/>
    </g>
  </g>
</svg>
