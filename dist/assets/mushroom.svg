<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Playful mushroom sprite with one normal mushroom and one flattened mushroom">
  <defs>
    <linearGradient id="capRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b57"/>
      <stop offset="55%" stop-color="#ff3b23"/>
      <stop offset="100%" stop-color="#c91414"/>
    </linearGradient>
    <linearGradient id="capShadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a0910" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#7a0010" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="stemCream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe7a1"/>
      <stop offset="100%" stop-color="#e6a45c"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a6b38"/>
      <stop offset="100%" stop-color="#6e431f"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c5ff2e"/>
      <stop offset="100%" stop-color="#3f9800"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <style>
      .outline{stroke:#6f0a10;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
      .spot{fill:#fff7df;opacity:.96}
      .cheek{fill:#ff8a6f;opacity:.85}
      .eye{fill:#321014}
      .shine{fill:#fff}
      .leafStroke{stroke:#347800;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <!-- Transparent background intentionally left empty -->

  <!-- LEFT: normal mushroom -->
  <g transform="translate(40 18)" filter="url(#shadow)">
    <ellipse cx="190" cy="320" rx="118" ry="20" fill="#000" opacity="0.10"/>
    <ellipse cx="185" cy="325" rx="88" ry="14" fill="url(#ground)" opacity="0.75"/>

    <g>
      <path class="outline" fill="url(#capRed)"
        d="M73 170
           C77 92, 137 52, 220 50
           C301 48, 364 92, 371 170
           C376 228, 337 256, 222 256
           C104 256, 69 227, 73 170 Z"/>
      <path fill="url(#capShadow)" opacity="0.55"
        d="M104 183 C127 134, 185 116, 248 120 C314 124, 347 154, 355 193 C339 236, 295 250, 222 250 C150 250, 114 231, 104 183 Z"/>
      <path class="outline" fill="#8f0d14"
        d="M104 204
           C137 178, 186 167, 224 167
           C270 167, 316 178, 343 204
           C317 227, 281 236, 223 236
           C167 236, 128 228, 104 204 Z"/>
      <ellipse cx="262" cy="90" rx="46" ry="36" class="spot"/>
      <ellipse cx="167" cy="146" rx="40" ry="34" class="spot"/>
      <ellipse cx="112" cy="143" rx="19" ry="30" class="spot" transform="rotate(26 112 143)"/>
      <ellipse cx="319" cy="162" rx="19" ry="28" class="spot" transform="rotate(-24 319 162)"/>
      <ellipse cx="82" cy="102" rx="36" ry="22" class="spot" transform="rotate(-18 82 102)"/>
      <ellipse cx="325" cy="104" rx="43" ry="28" class="spot" transform="rotate(18 325 104)"/>
      <ellipse cx="201" cy="94" rx="20" ry="16" fill="#ffd49f" opacity="0.7"/>
      <ellipse cx="214" cy="82" rx="12" ry="9" fill="#fff" opacity="0.35"/>
      <ellipse cx="263" cy="140" rx="22" ry="14" fill="#ff5f3d" opacity="0.5"/>
    </g>

    <g>
      <path class="outline" fill="url(#stemCream)"
        d="M149 188
           C151 164, 168 152, 191 150
           L244 150
           C270 151, 286 163, 291 188
           L302 297
           C305 326, 282 346, 221 346
           C155 346, 134 326, 138 295
           Z"/>
      <ellipse cx="221" cy="214" rx="90" ry="22" fill="#ffd26b" opacity="0.38"/>
      <ellipse cx="171" cy="245" rx="11" ry="13" class="eye"/>
      <ellipse cx="252" cy="245" rx="11" ry="13" class="eye"/>
      <ellipse cx="175" cy="240" rx="4" ry="5" class="shine"/>
      <ellipse cx="256" cy="240" rx="4" ry="5" class="shine"/>
      <path d="M190 286 C201 307, 239 307, 252 286" fill="none" stroke="#67110f" stroke-width="8" stroke-linecap="round"/>
      <ellipse cx="154" cy="278" rx="14" ry="8" class="cheek"/>
      <ellipse cx="288" cy="278" rx="14" ry="8" class="cheek"/>
      <ellipse cx="174" cy="310" rx="10" ry="17" fill="#c57c43" opacity="0.25"/>
      <ellipse cx="262" cy="307" rx="9" ry="14" fill="#c57c43" opacity="0.18"/>
    </g>

    <g>
      <path d="M78 324 C98 293, 118 285, 139 282 C125 303, 121 320, 118 341 C104 339, 90 336, 78 324 Z" fill="#2c6d00" opacity="0.85"/>
      <path d="M90 320 C105 287, 128 275, 157 274 C140 298, 136 319, 135 347 C116 343, 101 336, 90 320 Z" fill="url(#leaf)" class="leafStroke"/>
      <path d="M118 334 C129 321, 139 307, 148 290" fill="none" class="leafStroke"/>

      <path d="M146 337 C159 304, 179 291, 204 290 C190 313, 187 331, 186 352 C169 349, 156 345, 146 337 Z" fill="url(#leaf)" class="leafStroke"/>
      <path d="M168 343 C176 331, 184 318, 190 303" fill="none" class="leafStroke"/>

      <path d="M286 338 C299 305, 320 290, 347 289 C331 314, 327 333, 326 354 C308 350, 295 346, 286 338 Z" fill="url(#leaf)" class="leafStroke"/>
      <path d="M307 344 C315 333, 323 320, 331 304" fill="none" class="leafStroke"/>

      <path d="M312 320 C326 286, 350 272, 382 271 C364 298, 358 319, 357 350 C337 344, 323 336, 312 320 Z" fill="url(#leaf)" class="leafStroke"/>
      <path d="M338 337 C346 323, 354 308, 363 291" fill="none" class="leafStroke"/>

      <ellipse cx="109" cy="334" rx="9" ry="7" fill="#3ec4ff"/>
      <ellipse cx="129" cy="344" rx="7" ry="10" fill="#3ec4ff"/>
    </g>
  </g>

  <!-- RIGHT: flattened mushroom -->
  <g transform="translate(470 88)" filter="url(#shadow)">
    <ellipse cx="180" cy="238" rx="122" ry="16" fill="#000" opacity="0.10"/>
    <ellipse cx="180" cy="243" rx="100" ry="12" fill="url(#ground)" opacity="0.75"/>

    <g>
      <path class="outline" fill="url(#capRed)"
        d="M48 188
