<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <linearGradient id="cactusBody" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#7fe04a"/>
      <stop offset="55%" stop-color="#38a83d"/>
      <stop offset="100%" stop-color="#1f6e2a"/>
    </linearGradient>
    <linearGradient id="cactusShadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b5e20" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#103814" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="spike" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff0b3"/>
      <stop offset="100%" stop-color="#d0ad57"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2d58b"/>
      <stop offset="100%" stop-color="#d1a34e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

