      <polygon points="176,323 162,350 188,346"/>
      <polygon points="315,322 302,349 328,346"/>
      <polygon points="143,398 129,426 156,421"/>
      <polygon points="343,398 360,425 334,422"/>

      <polygon points="80,189 53,180 72,204"/>
