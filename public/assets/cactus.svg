    <path d="M245 82 C 245 145, 245 228, 245 438" fill="none" stroke="#6dd54a" stroke-width="12" stroke-linecap="round" opacity="0.75"/>
    <path d="M291 92 C 315 138, 319 208, 316 437" fill="none" stroke="#145521" stroke-width="10" stroke-linecap="round" opacity="0.28"/>
