<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Playful snowman sprite with one normal snowman and one flattened snowman">
  <defs>
    <linearGradient id="snowBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#dff3ff"/>
      <stop offset="100%" stop-color="#b9def3"/>
    </linearGradient>
    <linearGradient id="snowShadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7db6d8" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#6a9fc4" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="scarfRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6e65"/>
      <stop offset="100%" stop-color="#c72932"/>
    </linearGradient>
    <linearGradient id="hatDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#35506a"/>
      <stop offset="100%" stop-color="#192533"/>
    </linearGradient>
    <linearGradient id="groundSnow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fdff"/>
      <stop offset="100%" stop-color="#cde7f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <style>
      .outline{stroke:#6b9fc2;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
      .face{fill:#203040}
      .button{fill:#2c4258}
      .cheek{fill:#ffb7c1;opacity:.8}
      .shine{fill:#fff;opacity:.9}
      .twig{stroke:#7f5a38;stroke-width:8;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .snowflake{fill:#ffffff;opacity:.9}
    </style>
  </defs>

  <!-- LEFT: normal snowman -->
  <g transform="translate(45 20)" filter="url(#shadow)">
    <ellipse cx="190" cy="332" rx="122" ry="20" fill="#000" opacity="0.10"/>
    <ellipse cx="190" cy="336" rx="95" ry="15" fill="url(#groundSnow)" opacity="0.95"/>

    <g>
      <circle cx="192" cy="255" r="84" class="outline" fill="url(#snowBody)"/>
      <path d="M135 224 C155 194, 221 184, 261 210 C281 222, 286 244, 272 270 C254 301, 198 315, 149 294 C124 283, 113 255, 135 224 Z" fill="url(#snowShadow)" opacity=".45"/>
      <circle cx="199" cy="146" r="58" class="outline" fill="url(#snowBody)"/>
      <path d="M171 118 C186 99, 223 98, 241 114 C255 126, 257 152, 248 170 C237 193, 198 199, 168 182 C151 172, 150 136, 171 118 Z" fill="url(#snowShadow)" opacity=".4"/>

      <rect x="150" y="67" width="98" height="18" rx="8" fill="#182634" class="outline"/>
      <rect x="168" y="22" width="62" height="48" rx="10" fill="url(#hatDark)" class="outline"/>
      <rect x="161" y="73" width="75" height="8" rx="4" fill="#5f87a8" opacity=".65"/>

      <path d="M142 174 C168 159, 228 157, 257 172 L246 198 C220 189, 180 189, 151 199 Z" fill="url(#scarfRed)" class="outline"/>
      <path d="M233 183 C250 199, 259 228, 252 264" fill="none" stroke="#c72932" stroke-width="16" stroke-linecap="round"/>
      <path d="M233 183 C250 199, 259 228, 252 264" fill="none" stroke="#ff8b82" stroke-width="5" stroke-linecap="round" opacity=".55"/>

      <circle cx="183" cy="137" r="6" class="face"/>
      <circle cx="217" cy="137" r="6" class="face"/>
      <circle cx="186" cy="134" r="2.3" class="shine"/>
      <circle cx="220" cy="134" r="2.3" class="shine"/>
      <path d="M199 142 L233 151 L200 160 Z" fill="#f28c1f" stroke="#b95a14" stroke-width="4" stroke-linejoin="round"/>
      <path d="M180 165 C190 175, 209 175, 219 165" fill="none" stroke="#375066" stroke-width="7" stroke-linecap="round"/>
      <ellipse cx="162" cy="160" rx="10" ry="6" class="cheek"/>
      <ellipse cx="236" cy="160" rx="10" ry="6" class="cheek"/>

      <circle cx="192" cy="230" r="7" class="button"/>
      <circle cx="192" cy="258" r="7" class="button"/>
      <circle cx="192" cy="286" r="7" class="button"/>

      <path class="twig" d="M108 223 C79 212, 56 202, 33 181"/>
      <path class="twig" d="M95 212 C82 200, 74 188, 68 176"/>
      <path class="twig" d="M276 223 C306 212, 331 198, 355 174"/>
      <path class="twig" d="M289 213 C302 199, 312 187, 321 173"/>

      <circle cx="118" cy="98" r="9" class="snowflake"/>
      <circle cx="95" cy="128" r="6" class="snowflake"/>
      <circle cx="280" cy="96" r="8" class="snowflake"/>
      <circle cx="305" cy="133" r="5" class="snowflake"/>
    </g>
  </g>

  <!-- RIGHT: flattened snowman -->
  <g transform="translate(490 86)" filter="url(#shadow)">
    <ellipse cx="165" cy="245" rx="124" ry="16" fill="#000" opacity="0.10"/>
    <ellipse cx="165" cy="249" rx="102" ry="13" fill="url(#groundSnow)" opacity="0.95"/>

    <g>
      <ellipse cx="171" cy="209" rx="121" ry="39" class="outline" fill="url(#snowBody)"/>
      <path d="M82 200 C118 177, 212 171, 279 186 C309 193, 319 213, 288 227 C249 244, 142 246, 90 232 C64 225, 55 212, 82 200 Z" fill="url(#snowShadow)" opacity=".45"/>

      <ellipse cx="183" cy="170" rx="72" ry="30" class="outline" fill="url(#snowBody)"/>
      <path d="M135 162 C158 145, 216 143, 245 153 C265 161, 267 177, 247 186 C218 199, 160 199, 136 189 C120 183, 118 171, 135 162 Z" fill="url(#snowShadow)" opacity=".4"/>

      <rect x="144" y="121" width="85" height="14" rx="7" fill="#182634" class="outline"/>
      <rect x="160" y="90" width="52" height="32" rx="9" fill="url(#hatDark)" class="outline"/>

      <path d="M114 181 C147 171, 219 170, 255 180 L244 198 C215 192, 151 192, 124 199 Z" fill="url(#scarfRed)" class="outline"/>
      <path d="M240 184 C253 192, 261 208, 258 225" fill="none" stroke="#c72932" stroke-width="13" stroke-linecap="round"/>

      <circle cx="167" cy="166" r="5" class="face"/>
      <circle cx="198" cy="166" r="5" class="face"/>
      <path d="M182 170 L210 175 L182 180 Z" fill="#f28c1f" stroke="#b95a14" stroke-width="3" stroke-linejoin="round"/>
      <path d="M165 184 C174 191, 191 191, 201 184" fill="none" stroke="#375066" stroke-width="6" stroke-linecap="round"/>

      <circle cx="168" cy="203" r="6" class="button"/>
      <circle cx="193" cy="211" r="6" class="button"/>

      <path class="twig" d="M72 207 C51 202, 32 194, 14 181"/>
      <path class="twig" d="M267 209 C289 202, 311 191, 333 174"/>

      <circle cx="83" cy="131" r="7" class="snowflake"/>
      <circle cx="302" cy="125" r="6" class="snowflake"/>
    </g>
  </g>
</svg>
